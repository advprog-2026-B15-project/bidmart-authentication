name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build application JAR
        run: ./gradlew build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:latest
            docker stop bidmart-auth || true
            docker rm bidmart-auth || true
            docker run -d \
              --name bidmart-auth \
              --restart unless-stopped \
              -p 8081:8081 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DATABASE_USERNAME="${{ secrets.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e RABBITMQ_ENABLED=false \
              ${{ secrets.DOCKERHUB_USERNAME }}/bidmart-authentication:latest
