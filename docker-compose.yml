services:

  postgres:
    image: postgres:16-alpine
    container_name: bidmart-auth-db
    environment:
      POSTGRES_DB: bidmart_auth
      POSTGRES_USER: bidmart
      POSTGRES_PASSWORD: bidmart123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bidmart -d bidmart_auth" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bidmart-auth-app
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bidmart_auth
      DATABASE_USERNAME: bidmart
      DATABASE_PASSWORD: bidmart123
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: bidmart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: bidmart-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
