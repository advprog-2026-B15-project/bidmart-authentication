openapi: "3.0.3"
info:
  title: BidMart Authentication API
  description: Authentication and user management service for BidMart marketplace
  version: "1.0.0"

servers:
  - url: /
    description: Current server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        verificationToken:
          type: string
          description: "Dev/test only — would be sent via email in production"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          nullable: true
        refreshToken:
          type: string
          nullable: true
        tokenType:
          type: string
          example: Bearer
        mfaRequired:
          type: boolean
          description: "True when account has 2FA enabled; use mfaToken with /2fa/verify"
        mfaToken:
          type: string
          nullable: true
          description: "Short-lived token (5 min) to complete MFA verification"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    TotpSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: "Base32-encoded TOTP secret — store securely, show to user once"
        otpAuthUrl:
          type: string
          description: "otpauth:// URI suitable for QR code generation"

    TotpCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: "6-digit TOTP code from authenticator app"

    MfaVerifyRequest:
      type: object
      required: [mfaToken, code]
      properties:
        mfaToken:
          type: string
          description: "mfaToken received from the login response"
        code:
          type: string
          description: "6-digit TOTP code"

    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceInfo:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        role:
          type: string
        enabled:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        "409":
          description: Email already registered

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully
        "400":
          description: Invalid token
        "410":
          description: Token expired or already used

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login — returns full tokens or mfaRequired flag when 2FA is enabled
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful or MFA step required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
        "403":
          description: Account not verified or locked
        "429":
          description: Too many login attempts — try again later

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Refresh token invalid, expired, or reuse detected (family revoked)

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token (logout current device)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: Logged out successfully

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset (mocked — token returned in response body)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        "200":
          description: Reset instructions sent (always 200 to prevent user enumeration)

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Invalid, expired, or already-used token

  /api/auth/2fa/setup:
    post:
      tags: [2FA]
      summary: Generate TOTP secret and OTP auth URL (must be confirmed before 2FA is active)
      responses:
        "200":
          description: TOTP setup info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpSetupResponse'
        "401":
          description: Not authenticated

  /api/auth/2fa/confirm:
    post:
      tags: [2FA]
      summary: Confirm TOTP setup with a valid code — enables 2FA on the account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        "200":
          description: 2FA enabled successfully
        "400":
          description: Invalid TOTP code
        "401":
          description: Not authenticated
        "409":
          description: Setup not initiated

  /api/auth/2fa/verify:
    post:
      tags: [2FA]
      summary: Complete MFA login with TOTP code after receiving mfaRequired response
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        "200":
          description: MFA verified — full token pair returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid or expired MFA token / wrong TOTP code

  /api/auth/2fa/disable:
    post:
      tags: [2FA]
      summary: Disable 2FA on the account (requires current TOTP code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        "200":
          description: 2FA disabled
        "400":
          description: Invalid TOTP code
        "401":
          description: Not authenticated

  /api/auth/sessions:
    get:
      tags: [Sessions]
      summary: List all active sessions for the current user
      responses:
        "200":
          description: List of active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionResponse'
        "401":
          description: Not authenticated
    delete:
      tags: [Sessions]
      summary: Revoke all sessions (logout from all devices)
      responses:
        "200":
          description: All sessions revoked
        "401":
          description: Not authenticated

  /api/auth/sessions/{sessionId}:
    delete:
      tags: [Sessions]
      summary: Revoke a specific session by ID
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session revoked
        "401":
          description: Not authenticated
        "404":
          description: Session not found or does not belong to user

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: Not authenticated

  /api/admin/users/{id}/disable:
    post:
      tags: [Admin]
      summary: Disable a user account and revoke all sessions (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User disabled and sessions revoked
        "403":
          description: Insufficient permissions (not ADMIN)
        "404":
          description: User not found
