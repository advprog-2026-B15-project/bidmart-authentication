openapi: "3.0.3"
info:
  title: BidMart Authentication API
  description: Authentication and user management service for BidMart marketplace
  version: "1.0.0"

servers:
  - url: /
    description: Current server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        verificationToken:
          type: string
          description: "Dev/test only — would be sent via email in production"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        role:
          type: string
        enabled:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        "409":
          description: Email already registered

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully
        "400":
          description: Invalid token
        "410":
          description: Token expired or already used

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive access + refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
        "403":
          description: Account not verified or locked

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Refresh token invalid or expired

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token (logout)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: Logged out successfully

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset (mocked — token returned in response body)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        "200":
          description: Reset instructions sent (always 200 to prevent user enumeration)

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Invalid, expired, or already-used token

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: Not authenticated

  /api/admin/users/{id}/disable:
    post:
      tags: [Admin]
      summary: Disable a user account and revoke all sessions (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User disabled and sessions revoked
        "403":
          description: Insufficient permissions (not ADMIN)
        "404":
          description: User not found
