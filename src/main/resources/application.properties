spring.application.name=bidmart-authentication
server.port=${PORT:8081}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bidmart_auth}
spring.datasource.username=${DATABASE_USERNAME:bidmart}
spring.datasource.password=${DATABASE_PASSWORD:bidmart123}

# JPA - let Flyway manage the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:bidmart-auth-25percent-secret-key-minimum-32-chars!}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# RabbitMQ
spring.rabbitmq.enabled=${RABBITMQ_ENABLED:false}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Login rate limiting (5 attempts per 15 minutes per IP)
rate-limit.login.max-attempts=5
rate-limit.login.window-seconds=900
